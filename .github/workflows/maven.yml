# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  Image_Name: academy
  Tag_Name: v1
  artifact_name: academy-image

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      uses: ./.github/actions/maven_build
    - name: Build Docker image
      uses: ./.github/actions/docker_build
      with:
        image_name: ${{ env.Image_Name }}
        tag_name: ${{ env.Tag_Name }}
    - name: Save Docker image to file
      run: docker save -o $Image_Name.tar $Image_Name:$Tag_Name
    - name: Upload Docker image artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.artifact_name }}
        path: ${{ env.Image_Name }}.tar

  list-images:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4
    - name: Download Docker image artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ env.artifact_name }}
    - name: Load Docker image
      run: docker load -i $Image_Name.tar
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Push Docker image
      uses: ./.github/actions/docker_push
      with:
        docker_username: ${{ secrets.DOCKERHUB_USERNAME }}
        image_reference: ${{ env.Image_Name }}:${{ env.Tag_Name }}
    - name: List Docker images
      run: docker image ls
